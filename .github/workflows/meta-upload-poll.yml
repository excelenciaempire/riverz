name: Riverz cron tick

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: riverz-cron-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Drain Meta video uploads
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.META_CRON_SECRET }}" \
            "https://riverzai.com/api/meta/upload/cron-poll"
      - name: Drain stuck static-ads queues
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.META_CRON_SECRET }}" \
            "https://riverzai.com/api/static-ads/cron-drain"
      - name: Drain stuck UGC video queues
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.META_CRON_SECRET }}" \
            "https://riverzai.com/api/ugc/cron-drain"
